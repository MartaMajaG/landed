<!doctype html>
<html lang="en">
  <head>
    <title>Landed | Page not found</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        min-height: 100dvh;
        background: #F0F4FF;
        color: #111827;
        display: grid;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        place-items: center;
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: 100%;
      }

      main {
        width: min(100%, 34rem);
        padding: 2rem;
      }

      .error-panel {
        background: #FFFFFF;
        border: 1px solid #DDE5FF;
        border-radius: 8px;
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.10);
        padding: clamp(1.5rem, 5vw, 3rem);
      }

        .brand {
        color: #000000;
        display: inline-flex;
        font-size: 1.25rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        line-height: 1;
        text-decoration: none;
      }

      .status {
        color: #2563EB;
        display: block;
        font-size: 2rem;
        font-weight: 700;
        margin-top: 2.5rem;
      }

      h1 {
        font-size: clamp(2rem, 7vw, 4rem);
        letter-spacing: 0;
        line-height: 1;
        margin-top: 0.75rem;
      }

      p {
        color: #4B5563;
        font-size: 1.0625rem;
        margin-top: 1rem;
        max-width: 28rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      .button {
        align-items: center;
        background: #2563EB;
        border-radius: 6px;
        color: #FFFFFF;
        display: inline-flex;
        font-weight: 700;
        min-height: 2.75rem;
        padding: 0.75rem 1rem;
        text-decoration: none;
      }

      .button:hover,
      .button:focus {
        background: rgba(37, 99, 235, 0.8);
        color: #FFFFFF;
      }

      .button-secondary {
        background: #F9FAFB;
        border: 1px solid rgba(75, 85, 99, 0.18);
        color: #4B5563;
      }

      .button-secondary:hover,
      .button-secondary:focus {
        background: rgba(240, 244, 255, 0.58);
        color: #111827;
      }

      @media (max-width: 36rem) {
        main {
          padding: 1rem;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          justify-content: center;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- This file lives in public/404.html -->
    <main>
      <section class="error-panel" aria-labelledby="error-title">
        <a class="brand" href="/">Landed</a>
        <span class="status">error 404</span>
        <h1 id="error-title">Page not found</h1>
        <p><strong>The page you were looking for doesn't exist.</strong> You may have mistyped the address or the page may have moved. If you're the application owner check the logs for more information.</p>
        <div class="actions">
          <a class="button" href="/">Go to home</a>
          <a class="button button-secondary" href="/dashboard">Go to dashboard</a>
        </div>
      </section>
    </main>
  </body>
</html>
